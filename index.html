<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施策学習サイト — CTA</title>
<style>
/* ===== CT Design System Tokens ===== */
:root {
  --surface-primary:     #FFFFFF;
  --surface-secondary:   #F6F8FC;
  --surface-tertiary:    #EEF1F7;
  --surface-primary-high:#E8EEFB;
  --surface-accent:      #FFF4EE;
  --surface-success:     #F0FFF4;
  --surface-attention:   #FFF4F4;

  --text-high:    #1A1A2E;
  --text-medium:  #52526E;
  --text-low:     #9494B0;
  --text-white:   #FFFFFF;
  --text-primary: #0047CC;
  --text-accent:  #D45A00;
  --text-caution: #C53030;
  --text-success: #276749;

  --border-low:  #E2E8F0;
  --border-high: #B8C3D8;

  --brand-primary: #0047CC;

  --radius-4:  4px;
  --radius-8:  8px;
  --radius-16: 16px;
  --radius-24: 24px;

  --sp-4:  4px;  --sp-8:  8px;  --sp-12: 12px; --sp-16: 16px;
  --sp-20: 20px; --sp-24: 24px; --sp-32: 32px; --sp-40: 40px;
  --sp-48: 48px; --sp-64: 64px;

  --win-bg:     #F0FFF4; --win-border:  #276749; --win-text:  #276749;
  --draw-bg:    #F8F8FC; --draw-border: #9494B0; --draw-text: #52526E;
  --loss-bg:    #FFF5F5; --loss-border: #C53030; --loss-text: #C53030;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
  background: var(--surface-secondary);
  color: var(--text-high);
  line-height: 1.6;
  font-size: 14px;
}

/* ===== Header ===== */
.site-header {
  background: var(--surface-primary);
  border-bottom: 1px solid var(--border-low);
  padding: var(--sp-12) var(--sp-24);
  display: flex;
  align-items: center;
  gap: var(--sp-12);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.site-title { font-size: 15px; font-weight: 700; }
.site-badge {
  font-size: 11px; color: var(--text-medium);
  background: var(--surface-tertiary); padding: 2px 8px;
  border-radius: var(--radius-4);
}
.view-toggle {
  margin-left: auto; display: flex;
  border: 1px solid var(--border-low);
  border-radius: var(--radius-8); overflow: hidden;
}
.view-btn {
  padding: 6px 16px; font-size: 12px; font-weight: 600;
  color: var(--text-medium); background: var(--surface-primary);
  border: none; cursor: pointer; transition: all .15s;
}
.view-btn + .view-btn { border-left: 1px solid var(--border-low); }
.view-btn:hover { background: var(--surface-secondary); }
.view-btn.active { background: var(--brand-primary); color: var(--text-white); }

/* ===== Filter bar ===== */
.filter-bar {
  background: var(--surface-primary);
  border-bottom: 1px solid var(--border-low);
  padding: var(--sp-12) var(--sp-24);
  display: flex; flex-wrap: wrap; gap: var(--sp-12); align-items: center;
}
.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--text-low); pointer-events: none; font-size: 14px;
}
.search-input {
  padding: 7px 12px 7px 32px;
  border: 1px solid var(--border-low); border-radius: var(--radius-8);
  font-size: 13px; color: var(--text-high);
  background: var(--surface-secondary);
  outline: none; width: 240px; transition: border-color .15s;
}
.search-input:focus { border-color: var(--brand-primary); background: var(--surface-primary); }
.filter-group { display: flex; align-items: center; gap: var(--sp-8); flex-wrap: wrap; }
.filter-label { font-size: 11px; color: var(--text-low); white-space: nowrap; }
.chip {
  padding: 4px 12px; border: 1px solid var(--border-low);
  border-radius: var(--radius-24); font-size: 12px; color: var(--text-medium);
  background: var(--surface-primary); cursor: pointer;
  transition: all .15s; user-select: none;
}
.chip:hover { border-color: var(--brand-primary); color: var(--brand-primary); }
.chip.on {
  background: var(--surface-primary-high);
  border-color: var(--brand-primary); color: var(--brand-primary); font-weight: 600;
}
.filter-count {
  font-size: 11px; color: var(--text-low); margin-left: auto;
}

/* ===== Main ===== */
.main { max-width: 1200px; margin: 0 auto; padding: var(--sp-32) var(--sp-24); }

/* ===== Result section ===== */
.result-section { margin-bottom: var(--sp-40); }
.result-section.hidden { display: none; }
.section-head {
  display: flex; align-items: center; gap: var(--sp-12);
  margin-bottom: var(--sp-16);
}
.section-marker {
  width: 4px; height: 24px; border-radius: 2px;
}
.section-marker.win  { background: var(--win-border); }
.section-marker.draw { background: var(--draw-border); }
.section-marker.loss { background: var(--loss-border); }
.section-title { font-size: 16px; font-weight: 700; }
.section-count {
  font-size: 11px; color: var(--text-low);
  background: var(--surface-tertiary); padding: 2px 8px; border-radius: var(--radius-4);
}

/* ===== Masonry ===== */
.cards-masonry {
  columns: 3 280px; column-gap: var(--sp-16);
}
.card-wrap { break-inside: avoid; margin-bottom: var(--sp-16); }

/* ===== Card ===== */
.card {
  background: var(--surface-primary);
  border: 1px solid var(--border-low); border-radius: var(--radius-16);
  padding: var(--sp-20); cursor: pointer;
  transition: box-shadow .15s, transform .15s;
}
.card:hover {
  box-shadow: 0 4px 20px rgba(0,71,204,.1);
  transform: translateY(-2px);
}
.card-top {
  display: flex; align-items: center; gap: var(--sp-8);
  flex-wrap: wrap; margin-bottom: var(--sp-12);
}
.result-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: var(--radius-24);
  font-size: 11px; font-weight: 700;
}
.result-badge.win  { background: var(--win-bg);  color: var(--win-text);  border: 1px solid var(--win-border);  }
.result-badge.draw { background: var(--draw-bg); color: var(--draw-text); border: 1px solid var(--draw-border); }
.result-badge.loss { background: var(--loss-bg); color: var(--loss-text); border: 1px solid var(--loss-border); }
.type-tag {
  font-size: 11px; color: var(--text-medium);
  background: var(--surface-tertiary); padding: 3px 8px; border-radius: var(--radius-4);
}
.card-id { margin-left: auto; font-size: 10px; color: var(--text-low); font-family: monospace; }
.card-title { font-size: 14px; font-weight: 700; color: var(--text-high); margin-bottom: var(--sp-12); line-height: 1.4; }
.factor-block {
  border-left: 3px solid var(--brand-primary);
  padding-left: var(--sp-12); margin-bottom: var(--sp-16);
}
.factor-label { font-size: 10px; font-weight: 700; color: var(--text-primary); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.factor-text { font-size: 12px; color: var(--text-medium); line-height: 1.5; }
.card-meta {
  display: flex; gap: var(--sp-16); flex-wrap: wrap;
  padding-top: var(--sp-12); border-top: 1px solid var(--border-low);
}
.meta-item { display: flex; flex-direction: column; gap: 2px; }
.meta-lbl { font-size: 10px; color: var(--text-low); }
.meta-val { font-size: 12px; font-weight: 600; color: var(--text-medium); }
.meta-val.up   { color: var(--win-text); }
.meta-val.down { color: var(--loss-text); }

/* ===== Empty state ===== */
.empty-card {
  background: var(--surface-primary); border: 1px dashed var(--border-low);
  border-radius: var(--radius-16); padding: var(--sp-40);
  text-align: center; color: var(--text-low); font-size: 13px;
}

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  padding: var(--sp-24); opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface-primary); border-radius: var(--radius-24);
  max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto;
  transform: translateY(24px); transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-header {
  padding: var(--sp-24); border-bottom: 1px solid var(--border-low);
  display: flex; align-items: flex-start; gap: var(--sp-16);
  position: sticky; top: 0; background: var(--surface-primary);
  border-radius: var(--radius-24) var(--radius-24) 0 0; z-index: 1;
}
.modal-hinfo { flex: 1; }
.modal-badges { display: flex; gap: var(--sp-8); margin-bottom: var(--sp-8); flex-wrap: wrap; align-items: center; }
.modal-title { font-size: 18px; font-weight: 700; }
.modal-id { font-size: 12px; color: var(--text-low); font-family: monospace; margin-top: 4px; }
.modal-close {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border-low); background: var(--surface-primary);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--text-medium); flex-shrink: 0;
  transition: background .15s; line-height: 1;
}
.modal-close:hover { background: var(--surface-secondary); }
.modal-body { padding: var(--sp-24); }
.modal-sec { margin-bottom: var(--sp-28); }
.modal-sec-title {
  font-size: 12px; font-weight: 700; color: var(--text-primary);
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: var(--sp-12);
  display: flex; align-items: center; gap: var(--sp-8);
}
.modal-sec-title::before {
  content: ''; display: block; width: 3px; height: 12px;
  background: var(--brand-primary); border-radius: 2px;
}

/* Fact / Hypothesis blocks */
.fact-blk {
  background: var(--surface-secondary); border: 1px solid var(--border-low);
  border-radius: var(--radius-8); padding: var(--sp-12) var(--sp-16);
  margin-bottom: var(--sp-8);
}
.hypo-blk {
  background: var(--surface-accent); border: 1px dashed var(--text-accent);
  border-radius: var(--radius-8); padding: var(--sp-12) var(--sp-16);
  margin-bottom: var(--sp-8); position: relative;
}
.blk-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; margin-bottom: 6px;
}
.fact-blk .blk-label { color: var(--text-primary); }
.hypo-blk .blk-label { color: var(--text-accent); }
.blk-content { font-size: 13px; color: var(--text-medium); line-height: 1.6; }

/* Metrics row */
.metrics-row { display: flex; gap: var(--sp-12); flex-wrap: wrap; }
.metric-pill {
  background: var(--surface-secondary); border: 1px solid var(--border-low);
  border-radius: var(--radius-8); padding: var(--sp-12) var(--sp-16); flex: 1; min-width: 100px;
}
.metric-lbl { font-size: 10px; color: var(--text-low); margin-bottom: 4px; }
.metric-val { font-size: 18px; font-weight: 700; color: var(--text-high); }
.metric-sub { font-size: 11px; color: var(--text-medium); margin-top: 2px; }

/* Insight list */
.insight-items { display: flex; flex-direction: column; gap: var(--sp-8); }
.insight-row { display: flex; gap: var(--sp-12); align-items: flex-start; }
.ins-dot {
  width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; margin-top: 2px;
}
.ins-dot.pos { background: var(--win-bg); color: var(--win-text); }
.ins-dot.neg { background: var(--loss-bg); color: var(--loss-text); }
.ins-dot.neu { background: var(--surface-tertiary); color: var(--text-medium); }
.ins-text { font-size: 13px; color: var(--text-medium); line-height: 1.5; }

/* Tags row */
.next-actions { display: flex; flex-direction: column; gap: var(--sp-8); }
.action-item {
  display: flex; gap: var(--sp-8); align-items: flex-start;
  padding: var(--sp-8) var(--sp-12); background: var(--surface-primary-high);
  border-radius: var(--radius-8); font-size: 13px; color: var(--text-medium);
}
.action-arrow { color: var(--brand-primary); font-weight: 700; flex-shrink: 0; }

/* ===== Insights view ===== */
#view-insights { display: none; }
#view-insights.active { display: block; }
#view-list.hidden { display: none; }

.ins-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: var(--sp-24);
  margin-bottom: var(--sp-32);
}
.ins-panel {
  background: var(--surface-primary); border: 1px solid var(--border-low);
  border-radius: var(--radius-16); padding: var(--sp-24);
}
.ins-panel-title {
  font-size: 14px; font-weight: 700; margin-bottom: var(--sp-16);
  display: flex; align-items: center; gap: var(--sp-8);
}
.ins-panel-icon { font-size: 18px; }
.pattern-row {
  padding: var(--sp-12) 0; border-bottom: 1px solid var(--border-low);
  display: flex; gap: var(--sp-12); align-items: flex-start;
}
.pattern-row:last-child { border-bottom: none; padding-bottom: 0; }
.pattern-ico { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.pattern-body {}
.pattern-txt { font-size: 13px; color: var(--text-medium); line-height: 1.5; }
.pattern-src { font-size: 11px; color: var(--text-low); margin-top: 3px; }

.score-bar-wrap { margin: var(--sp-16) 0; }
.score-bar {
  display: flex; border-radius: var(--radius-8); overflow: hidden;
  height: 28px; background: var(--surface-tertiary);
}
.score-seg {
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: white; transition: width .4s;
}
.score-seg.win  { background: var(--win-border); }
.score-seg.draw { background: var(--draw-border); }
.score-seg.loss { background: var(--loss-border); }
.score-legend {
  display: flex; gap: var(--sp-16); margin-top: var(--sp-8);
}
.score-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-medium); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* ===== Design Insights ===== */
:root {
  --design-bg:     #F5F0FF;
  --design-border: #9B72E8;
  --design-text:   #6B3AC9;
  --di-good-bg:    #F0FFF4; --di-good-text: #276749; --di-good-border: #9AE6B4;
  --di-caution-bg: #FFFBEB; --di-caution-text: #B45309; --di-caution-border: #FCD34D;
  --di-bad-bg:     #FFF5F5; --di-bad-text: #C53030; --di-bad-border: #FCA5A5;
}
.di-section {
  background: var(--design-bg); border: 1px solid var(--design-border);
  border-radius: var(--radius-8); padding: var(--sp-12);
  margin-bottom: var(--sp-12);
}
.di-header {
  font-size: 10px; font-weight: 700; color: var(--design-text);
  text-transform: uppercase; letter-spacing: .5px;
  margin-bottom: var(--sp-8); display: flex; align-items: center; gap: 4px;
}
.di-row {
  display: flex; gap: var(--sp-8); align-items: flex-start;
  padding: 6px var(--sp-8);
  border-radius: var(--radius-4); margin-bottom: 4px;
}
.di-row:last-child { margin-bottom: 0; }
.di-row.good    { background: var(--di-good-bg); border: 1px solid var(--di-good-border); }
.di-row.caution { background: var(--di-caution-bg); border: 1px solid var(--di-caution-border); }
.di-row.bad     { background: var(--di-bad-bg); border: 1px solid var(--di-bad-border); }
.di-icon { font-size: 12px; flex-shrink: 0; line-height: 1.6; }
.di-text { font-size: 12px; line-height: 1.5; }
.di-row.good    .di-text { color: var(--di-good-text); }
.di-row.caution .di-text { color: var(--di-caution-text); }
.di-row.bad     .di-text { color: var(--di-bad-text); }

/* modal design section */
.di-modal-row {
  display: flex; gap: var(--sp-12); align-items: flex-start;
  padding: var(--sp-12) var(--sp-16); border-radius: var(--radius-8);
  margin-bottom: var(--sp-8);
}
.di-modal-row.good    { background: var(--di-good-bg); border: 1px solid var(--di-good-border); }
.di-modal-row.caution { background: var(--di-caution-bg); border: 1px solid var(--di-caution-border); }
.di-modal-row.bad     { background: var(--di-bad-bg); border: 1px solid var(--di-bad-border); }
.di-modal-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.di-modal-text { font-size: 13px; line-height: 1.6; }
.di-modal-row.good    .di-modal-text { color: var(--di-good-text); }
.di-modal-row.caution .di-modal-text { color: var(--di-caution-text); }
.di-modal-row.bad     .di-modal-text { color: var(--di-bad-text); }

@media (max-width: 640px) {
  .main { padding: var(--sp-16); }
  .filter-bar { padding: var(--sp-12) var(--sp-16); }
  .site-header { padding: var(--sp-12) var(--sp-16); }
  .cards-masonry { columns: 1; }
}
</style>
</head>
<body>

<!-- ===== DATA ===== -->
<script>
const MEASURES = [
  {

    hypothesisInsights: [

      "CTSボタン文言「27卒のスカウト登録はこちら」が26卒・28卒にも表示されており、ターゲット外ユーザーへの混乱も生んでいた可能性がある",
      "青色CTAボタン（CTA側）がCTSボタンよりクリックを誘発しやすいという視覚的要因があった可能性がある"
    ],
    rootCause: "選択肢の多さが意思決定を妨げていた（ヒック=ハイマンの法則）。CTA/CTSの2択が顕在層をCTS側に分散させており、1本化によってEF完了率が約2倍に。寄せ対応データで効果が明確に出たことで採用判断に至った。",
    metrics: {

      significance: "有意差なし（全体AB）",
      sampleSize: "A: 28,546 / B: 28,208 セッション"
    },
    nextActions: [
      "ボタン文言に卒年が入っていない記事（26卒/27卒の効果を固定化）でCTA/CTS削除の効果を別途検証し、より精緻な因果を確認する",
      "「2択→1択」の選択肢削減パターンを次施策の設計テンプレートとして確立する",
      "寄せ対応データが全体ABより効果が大きい場合の判断基準を明文化する"
    ],
    designInsights: [
      { type: 'good', text: 'シングルCTAの原則：選択肢を1つに絞ると迷いがなくなりEF完了率が約2倍になった。複数のCTAが並ぶレイアウトは「どちらでもよい」のサインをユーザーに送ってしまう。' },
      { type: 'bad', text: '競合する2つのCTAは互いを打ち消す：CTA vs CTSのように「似ているが違うもの」が並ぶと顕在層が分散し、転換率が下がる。1ページに主CTAは1つに絞るのが原則。' },
      { type: 'caution', text: 'ボタン文言とターゲットの一致を確認する：「27卒のスカウト登録はこちら」が26卒・28卒にも表示されていた。文言とターゲットのミスマッチは意図しないユーザー行動を誘発する。' },
    ]
  },

<script>
// ===== State =====
let activeTypes = new Set();
let activeDevices = new Set();
let searchQ = "";

// ===== Init =====
function init() {
  buildFilterChips();
  buildInsights();
  applyFilters();
}

function buildFilterChips() {
  const types = [...new Set(MEASURES.map(m => m.type))];
  const devices = [...new Set(MEASURES.flatMap(m => m.devices))];

  const tc = document.getElementById('type-chips');
  types.forEach(t => {
    tc.innerHTML += `<button class="chip" data-type="${t}" onclick="toggleType('${t}')">${t}</button> `;
  });

  const dc = document.getElementById('device-chips');
  devices.forEach(d => {
    dc.innerHTML += `<button class="chip" data-device="${d}" onclick="toggleDevice('${d}')">${d}</button> `;
  });
}

function toggleType(t) {
  if (activeTypes.has(t)) activeTypes.delete(t); else activeTypes.add(t);
  document.querySelectorAll('[data-type]').forEach(el => {
    el.classList.toggle('on', activeTypes.has(el.dataset.type));
  });
  applyFilters();
}

function toggleDevice(d) {
  if (activeDevices.has(d)) activeDevices.delete(d); else activeDevices.add(d);
  document.querySelectorAll('[data-device]').forEach(el => {
    el.classList.toggle('on', activeDevices.has(el.dataset.device));
  });
  applyFilters();
}

function applyFilters() {
  searchQ = document.getElementById('search-input').value.toLowerCase().trim();

  const filtered = MEASURES.filter(m => {
    if (activeTypes.size && !activeTypes.has(m.type)) return false;
    if (activeDevices.size && !m.devices.some(d => activeDevices.has(d))) return false;
    if (searchQ) {
      const hay = [m.title, m.hypothesis, m.rootCause, ...m.factuals].join(' ').toLowerCase();
      if (!hay.includes(searchQ)) return false;
    }
    return true;
  });

  renderCards(filtered);
  document.getElementById('filter-count').textContent = `${filtered.length} / ${MEASURES.length} 件`;
}

// ===== Render cards =====
function renderCards(items) {
  const groups = { win: [], draw: [], loss: [] };
  items.forEach(m => groups[m.result].push(m));

  ['win', 'draw', 'loss'].forEach(r => {
    const container = document.getElementById('cards-' + r);
    const count = document.getElementById('count-' + r);
    const section = document.getElementById('section-' + r);
    count.textContent = groups[r].length + ' 件';
    section.classList.toggle('hidden', groups[r].length === 0);
    if (groups[r].length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = groups[r].map(m => cardHTML(m)).join('');
  });

  const anyResult = items.length > 0;
  document.getElementById('no-results').style.display = anyResult ? 'none' : 'block';
}

function badgeHTML(result) {
  const map = { win: ['✅', '勝ち'], draw: ['➖', '引き分け'], loss: ['❌', '負け'] };
  const [icon, label] = map[result];
  return `<span class="result-badge ${result}">${icon} ${label}</span>`;
}

function diIcon(type) {
  return type === 'good' ? '✅' : type === 'caution' ? '⚠️' : '❌';
}

function cardHTML(m) {
  const metricEntries = Object.entries(m.metrics).slice(0, 3);
  const metaHTML = metricEntries.map(([k, v]) => {
    const labels = { ctrChange: 'CTR変化', cvrChange: 'CVR変化', significance: '有意差', sampleSize: 'サンプル' };
    const cls = v.startsWith('+') ? 'up' : v.startsWith('-') ? 'down' : '';
    return `<div class="meta-item"><div class="meta-lbl">${labels[k] || k}</div><div class="meta-val ${cls}">${v}</div></div>`;
  }).join('');

  // カードには全インサイトを表示
  const diRows = (m.designInsights || []).map(d =>
    `<div class="di-row ${d.type}"><span class="di-icon">${diIcon(d.type)}</span><span class="di-text">${d.text}</span></div>`
  ).join('');
  const diHTML = diRows ? `
    <div class="di-section">
      <div class="di-header">🎨 デザイン観点の活かし</div>
      ${diRows}
    </div>` : '';

  return `
    <div class="card-wrap">
      <div class="card" onclick="openModal('${m.id}')">
        <div class="card-top">
          ${badgeHTML(m.result)}
          <span class="type-tag">${m.type}</span>
          <span class="card-id">${m.id}</span>
        </div>
        <div class="card-title">${m.title}</div>
        <div class="factor-block">
          <div class="factor-label">要因サマリ</div>
          <div class="factor-text">${m.rootCause.substring(0, 120)}${m.rootCause.length > 120 ? '…' : ''}</div>
        </div>
        ${diHTML}
        <div class="card-meta">${metaHTML}</div>
      </div>
    </div>`;
}

// ===== Modal =====
function openModal(id) {
  const m = MEASURES.find(x => x.id === id);
  if (!m) return;

  document.getElementById('modal-badges').innerHTML =
    badgeHTML(m.result) +
    `<span class="type-tag">${m.type}</span>` +
    m.devices.map(d => `<span class="type-tag">${d}</span>`).join('');
  document.getElementById('modal-title').textContent = m.title;
  document.getElementById('modal-id').textContent = m.id + ' · ' + m.period + ' · ' + m.adoptionLabel;

  const factualHTML = m.factuals.map(f =>
    `<div class="fact-blk"><div class="blk-label">📋 事実</div><div class="blk-content">${f}</div></div>`
  ).join('');

  const hypoInsightHTML = m.hypothesisInsights.map(h =>
    `<div class="hypo-blk"><div class="blk-label">🤔 AI推論（仮説）</div><div class="blk-content">${h}</div></div>`
  ).join('');

  const metricsHTML = Object.entries(m.metrics).map(([k, v]) => {
    const labels = { ctrChange: 'CTR変化', cvrChange: 'CVR変化', significance: '統計的有意差', sampleSize: 'サンプル数' };
    return `<div class="metric-pill"><div class="metric-lbl">${labels[k] || k}</div><div class="metric-val">${v}</div></div>`;
  }).join('');

  const insightsHTML = [
    ...m.factuals.map(f => `<div class="insight-row"><div class="ins-dot neu">📋</div><div class="ins-text">${f}</div></div>`),
    ...m.hypothesisInsights.map(h => `<div class="insight-row"><div class="ins-dot neg">💭</div><div class="ins-text">【推論】${h}</div></div>`)
  ].join('');

  const nextHTML = m.nextActions.map(a =>
    `<div class="action-item"><span class="action-arrow">→</span> ${a}</div>`
  ).join('');

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-sec">
      <div class="modal-sec-title">仮説</div>
      <div class="${m.hypothesisIsAI ? 'hypo-blk' : 'fact-blk'}">
        <div class="blk-label">${m.hypothesisIsAI ? '🤔 AI推論' : '📋 事実（施策ドックより）'}</div>
        <div class="blk-content">${m.hypothesis}</div>
      </div>
    </div>
    <div class="modal-sec">
      <div class="modal-sec-title">計測数値</div>
      <div class="metrics-row">${metricsHTML}</div>
    </div>
    <div class="modal-sec">
      <div class="modal-sec-title">事実 vs AI推論の区別</div>
      ${factualHTML}
      ${hypoInsightHTML}
    </div>
    <div class="modal-sec">
      <div class="modal-sec-title">要因分析（根本原因）</div>
      <div class="fact-blk">
        <div class="blk-label">🎯 要因サマリ</div>
        <div class="blk-content">${m.rootCause}</div>
      </div>
    </div>
    <div class="modal-sec">
      <div class="modal-sec-title">🎨 デザイン観点の活かし（CTユーザー向け判断）</div>
      ${(m.designInsights || []).map(d => `
        <div class="di-modal-row ${d.type}">
          <span class="di-modal-icon">${diIcon(d.type)}</span>
          <span class="di-modal-text">${d.text}</span>
        </div>`).join('')}
    </div>
    <div class="modal-sec">
      <div class="modal-sec-title">次に活かすアクション</div>
      <div class="next-actions">${nextHTML}</div>
    </div>`;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ===== View switch =====
function switchView(v) {
  document.getElementById('view-list').classList.toggle('hidden', v !== 'list');
  document.getElementById('view-insights').classList.toggle('active', v === 'insights');
  document.getElementById('filter-bar-wrap').style.display = v === 'list' ? '' : 'none';
  document.getElementById('btn-list').classList.toggle('active', v === 'list');
  document.getElementById('btn-insights').classList.toggle('active', v === 'insights');
}

// ===== Insights view =====
function buildInsights() {
  // Score bar
  const win = MEASURES.filter(m => m.result === 'win').length;
  const draw = MEASURES.filter(m => m.result === 'draw').length;
  const loss = MEASURES.filter(m => m.result === 'loss').length;
  const total = MEASURES.length;
  const bar = document.getElementById('score-bar');
  bar.innerHTML = `
    <div class="score-seg win"  style="width:${win/total*100}%">${win}勝</div>
    <div class="score-seg draw" style="width:${draw/total*100}%">${draw}分</div>
    <div class="score-seg loss" style="width:${loss/total*100}%">${loss}敗</div>`;

  // Patterns
  const pl = document.getElementById('pattern-list');
  pl.innerHTML = INSIGHTS.patterns.map(p => `
    <div class="pattern-row">
      <div class="pattern-ico">${p.icon}</div>
      <div class="pattern-body">
        <div class="pattern-txt">${p.text}</div>
        <div class="pattern-src">${p.sources.join(' · ')}</div>
      </div>
    </div>`).join('');

  // Hypothesis misses
  const hm = document.getElementById('hypo-miss-list');
  hm.innerHTML = INSIGHTS.hypothesisMisses.map(h => `
    <div class="pattern-row">
      <div class="pattern-ico">❌</div>
      <div class="pattern-body">
        <div class="pattern-txt">「${h.text}」</div>
        <div class="pattern-src">${h.source} — ${h.lesson}</div>
      </div>
    </div>`).join('');

  // All cards mini
  const ac = document.getElementById('all-cards-insights');
  ac.innerHTML = MEASURES.map(m => `
    <div class="ins-panel" style="cursor:pointer" onclick="openModal('${m.id}')">
      <div class="ins-panel-title">
        ${badgeHTML(m.result)}
        <span style="font-size:13px;font-weight:700;color:var(--text-high)">${m.id}</span>
      </div>
      <p style="font-size:13px;color:var(--text-medium);margin-bottom:var(--sp-12)">${m.title}</p>
      <div class="fact-blk" style="margin:0">
        <div class="blk-label">採用結果</div>
        <div class="blk-content">${m.adoptionLabel}</div>
      </div>
    </div>`).join('');
}

init();
</script>
</body>
</html>
